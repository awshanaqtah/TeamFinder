<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Project Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              'fade-in': 'fadeIn 0.5s ease-in-out',
              'slide-in-up': 'slideInUp 0.5s ease-out',
              'bounce-click': 'bounceClick 0.3s ease-in-out',
              'pulse-slow': 'pulseSlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shake': 'shake 0.5s ease-in-out',
              'slide-in-right': 'slideInRight 0.3s ease-out',
              'flip': 'flip 0.6s ease-in-out',
              'fill-width': 'fillWidth 0.8s ease-out',
              'glow': 'glow 2s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: 0 },
                '100%': { opacity: 1 },
              },
              slideInUp: {
                '0%': { transform: 'translateY(20px)', opacity: 0 },
                '100%': { transform: 'translateY(0)', opacity: 1 },
              },
              bounceClick: {
                '0%, 100%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.3)' },
              },
              pulseSlow: {
                '0%, 100%': { opacity: 1 },
                '50%': { opacity: 0.7 },
              },
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-4px)' },
                '20%, 40%, 60%, 80%': { transform: 'translateX(4px)' },
              },
              slideInRight: {
                '0%': { transform: 'translateX(100%)', opacity: 0 },
                '100%': { transform: 'translateX(0)', opacity: 1 },
              },
              flip: {
                '0%': { transform: 'rotateY(0deg)' },
                '100%': { transform: 'rotateY(360deg)' },
              },
              fillWidth: {
                'from': { width: '0%' },
              },
              glow: {
                '0%, 100%': { boxShadow: '0 0 5px rgba(56, 189, 248, 0.5)' },
                '50%': { boxShadow: '0 0 20px rgba(56, 189, 248, 0.8)' },
              },
            },
          },
        },
      }
    </script>
<link rel="stylesheet" href="/src/index.css">
</head>
  <body class="bg-slate-900 text-slate-200">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
